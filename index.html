<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrimMC.pl | Przerwa Techniczna</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #ff9d00;
    --discord: #5865F2;
}

body {
    margin:0;
    font-family:'Plus Jakarta Sans', sans-serif;
    background:#050505;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

/* GLOW BACKGROUND */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at center, rgba(255,157,0,0.15), transparent 60%);
    z-index:-1;
}

/* CONTAINER */
.container {
    max-width:600px;
}

/* LOGO */
.logo {
    width:180px;
    margin-bottom:20px;
    animation: float 6s infinite ease-in-out, glow 2s infinite alternate;
}

@keyframes float {
    50% { transform: translateY(-10px); }
}

@keyframes glow {
    from { filter: drop-shadow(0 0 10px rgba(255,157,0,0.3)); }
    to { filter: drop-shadow(0 0 40px rgba(255,157,0,0.8)); }
}

/* TITLE */
h1 {
    font-size:3rem;
    margin:10px 0;
    background: linear-gradient(to right,#fff,#ff9d00);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* COUNTDOWN */
.countdown {
    display:flex;
    justify-content:center;
    gap:20px;
    margin:30px 0;
}

.box {
    background: rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
    min-width:80px;
}

.box h2 {
    margin:0;
    font-size:2rem;
}

.box span {
    font-size:0.8rem;
    color:#aaa;
}

/* BUTTON */
.discord-btn {
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:15px 30px;
    border-radius:100px;
    background: var(--discord);
    color:#fff;
    text-decoration:none;
    font-weight:700;
    transition:0.3s;
}

.discord-btn:hover {
    transform: scale(1.08);
    box-shadow:0 0 25px rgba(88,101,242,0.7);
}
</style>
</head>

<body>

<div class="container">

<img src="watermarked_img_16733567260916648997.png" class="logo">

<h1>PRZERWA TECHNICZNA</h1>
<p style="color:#aaa;">Wracamy już wkrótce...</p>

<div class="countdown">
    <div class="box">
        <h2 id="days">0</h2>
        <span>Dni</span>
    </div>
    <div class="box">
        <h2 id="hours">0</h2>
        <span>Godziny</span>
    </div>
    <div class="box">
        <h2 id="minutes">0</h2>
        <span>Minuty</span>
    </div>
    <div class="box">
        <h2 id="seconds">0</h2>
        <span>Sekundy</span>
    </div>
</div>

<a href="https://discord.gg/cfUxnMT9ua" target="_blank" class="discord-btn">
<i class="fa-brands fa-discord"></i> Dołącz na Discord
</a>

</div>

<script>
// DATA DO 5 MAJA (możesz zmienić godzinę)
const targetDate = new Date("May 5, 2026 18:00:00").getTime();

function updateCountdown(){
    const now = new Date().getTime();
    const diff = targetDate - now;

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
    const m = Math.floor((diff % (1000*60*60)) / (1000*60));
    const s = Math.floor((diff % (1000*60)) / 1000);

    document.getElementById("days").innerText = d;
    document.getElementById("hours").innerText = h;
    document.getElementById("minutes").innerText = m;
    document.getElementById("seconds").innerText = s;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
